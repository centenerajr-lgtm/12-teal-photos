<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>12 STEM TEAL</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Georgia, 'Times New Roman', Times, serif;
background:#1b4e42;
}
header{
position: fixed;
top:0;
width:100%;
background:#000000;
color:rgb(248, 242, 242);
display:flex;
align-items:center;
justify-content:space-between;
padding:15px;
}
h2{
background:none;
}
div{
display: flex;
flex-direction: row;    
}
.header-left{
background: none;
display:flex;
gap:15px;
align-items:center;
}

.home-btn {
padding: 0;
border: Black;
height: 40px;
width: 40px;    
}
.home-btn img {
border-radius: 6px;
cursor:pointer; 
transition: 0.2s;       
height: 100%;
width: 100%;    
}
.home-btn:hover {
transform: scale(2);        
}
button {
background:#ccc;
border-radius: 6px;
cursor:pointer;
transition: 0.3s;
padding: 0;
border: black;
height: 40px;
width: 40px;    
}
button:hover {
transform: scale(2);
background: whitesmoke;        
}
.hero{
display:flex;
justify-content:center;
padding:40px;
}

.hero-box{
color: white;
width:100%;
height:20%;
display:flex;
flex-direction: column;
align-items:center;
justify-content:center;
}

.hero-box img {
height: 50%;
width: 100%;
border: 4px solid rgb(0, 0, 0);
border-radius: 15px;
box-shadow: 0 6px 20px rgba(0,0,0,0.2);
padding: 5px;
background: rgb(32, 5, 5);
transition: 0.3s;
}

.hero-box img:hover {
cursor:progress;
}
.image-desc {
background: rgb(126, 114, 114);
margin-top: 40px;        
}
.description{
text-align:center;
padding:20px;
background:#2b997e;
color:azure;
}
h1{
background:none;
}
.categories{
margin-top: 20px;
margin-bottom: 50px;
display:grid;
grid-template-columns: repeat(3, 200px); 
gap:80px; 
padding:10px;
background:none;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
justify-content:center; 
align-content:center;   
}
.category{
box-sizing: border-box;    
cursor:pointer;
transition:0.3s;
height:100px;
background:white;
border:2px solid #080808;
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
}
.category:hover {
transform:scale(1.3);         
}
.category img{
border-radius:20px;    
width: 230px;
height: 100px;    
}


footer{
background:#000000;
color:white;
text-align:center;
padding:20px;
}

</style>
</head>

<body>

<header>
<div class="header-left">
<button>☰</button>
<button class="home-btn"> <img src=" https://raw.githubusercontent.com/centenerajr-lgtm/12-teal-photos/1fd844d55fdf03ed2abc8a15328edc4b0e32b2aa/pink-grey-gradient-home-button-icon-home-button-icon-transparent-11553494391n140cdoukd.png"
alt="button">

</button>
</div>

<h2>WELCOME TO 12-STEM TEAL</h2>

<div> <a href="https://htmlpreview.github.io/?https://github.com/centenerajr-lgtm/website-png/blob/10d19e264fd5e3d280e2776977bd9a4c9919702f/index.html">Lightmode</a>
</div>
</header>


<section class="hero">
<div class="hero-box">
<img src="https://raw.githubusercontent.com/centenerajr-lgtm/12-teal-photos/0cbcbf51d8d769315db5d928921ea4fe11878738/481714088_626366150194488_5962722867243626304_n.jpg" alt="photo"
        width="400"
        height="150"
        >
        <p class="image-desc"></p>
 <p>This is a website dediicated to our classmates and teachers, especially for our adviser Samboy Sampaga. </p>       
</div>
</section>


<section class="description">
<h1>Choose an information base on the category list.</h1>
</section>


<section class="categories">
<div class="category"><img src = "https://raw.githubusercontent.com/centenerajr-lgtm/12-teal-photos/ab49cf895721a64b927631b5ef15b684a1c0596b/c815f03c-ff2c-4941-b719-bc6f7b0c3732.jfif"
> </div>
<div class="category">Category 2</div>
<div class="category">Category 3</div>
</section>

</body>
</html>
